<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notes</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f5f5;
      color: #333;
      min-height: 100vh;
    }

    header {
      background: #fff;
      border-bottom: 1px solid #e0e0e0;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    header h1 {
      font-size: 20px;
      font-weight: 600;
    }

    .btn {
      border: none;
      cursor: pointer;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      padding: 8px 16px;
      transition: background 0.15s;
    }

    .btn-primary {
      background: #2563eb;
      color: #fff;
    }

    .btn-primary:hover { background: #1d4ed8; }

    .btn-ghost {
      background: transparent;
      color: #666;
    }

    .btn-ghost:hover { background: #f0f0f0; }

    .btn-danger {
      background: transparent;
      color: #dc2626;
    }

    .btn-danger:hover { background: #fef2f2; }

    .container {
      max-width: 800px;
      margin: 0 auto;
      padding: 24px;
    }

    .search-bar {
      width: 100%;
      padding: 10px 16px;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      font-size: 14px;
      background: #fff;
      margin-bottom: 20px;
      outline: none;
    }

    .search-bar:focus { border-color: #2563eb; }

    .notes-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .note-card {
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 10px;
      padding: 16px 20px;
      cursor: pointer;
      transition: box-shadow 0.15s;
    }

    .note-card:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.08); }

    .note-card h3 {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .note-card .preview {
      font-size: 14px;
      color: #888;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .note-card .date {
      font-size: 12px;
      color: #aaa;
      margin-top: 8px;
    }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #999;
    }

    .empty-state p { margin-top: 8px; font-size: 14px; }

    /* Editor */
    .editor { display: none; }
    .editor.active { display: block; }
    .list-view.hidden { display: none; }

    .editor-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
    }

    .editor-header .spacer { flex: 1; }

    .title-input {
      width: 100%;
      padding: 8px 0;
      border: none;
      font-size: 24px;
      font-weight: 700;
      outline: none;
      background: transparent;
      margin-bottom: 8px;
    }

    .body-input {
      width: 100%;
      min-height: 400px;
      padding: 0;
      border: none;
      font-size: 15px;
      line-height: 1.7;
      outline: none;
      resize: vertical;
      background: transparent;
      font-family: inherit;
    }
  </style>
</head>
<body>
  <header>
    <h1>Notes</h1>
    <button class="btn btn-primary" id="newBtn">+ New Note</button>
  </header>

  <div class="container">
    <!-- List View -->
    <div class="list-view" id="listView">
      <input type="text" class="search-bar" id="searchBar" placeholder="Search notes...">
      <div class="notes-list" id="notesList"></div>
      <div class="empty-state" id="emptyState" style="display:none;">
        <p><strong>No notes yet</strong></p>
        <p>Create your first note to get started.</p>
      </div>
    </div>

    <!-- Editor View -->
    <div class="editor" id="editorView">
      <div class="editor-header">
        <button class="btn btn-ghost" id="backBtn">&larr; Back</button>
        <span class="spacer"></span>
        <button class="btn btn-danger" id="deleteBtn">Delete</button>
      </div>
      <input type="text" class="title-input" id="titleInput" placeholder="Note title">
      <textarea class="body-input" id="bodyInput" placeholder="Start writing..."></textarea>
    </div>
  </div>

  <script>
    const STORAGE_KEY = 'notes_app_data';

    function loadNotes() {
      return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
    }

    function saveNotes(notes) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(notes));
    }

    function formatDate(ts) {
      return new Date(ts).toLocaleDateString(undefined, {
        month: 'short', day: 'numeric', year: 'numeric', hour: '2-digit', minute: '2-digit'
      });
    }

    let notes = loadNotes();
    let currentId = null;

    const listView = document.getElementById('listView');
    const editorView = document.getElementById('editorView');
    const notesList = document.getElementById('notesList');
    const emptyState = document.getElementById('emptyState');
    const searchBar = document.getElementById('searchBar');
    const titleInput = document.getElementById('titleInput');
    const bodyInput = document.getElementById('bodyInput');

    function renderList() {
      const query = searchBar.value.toLowerCase();
      const filtered = notes.filter(n =>
        n.title.toLowerCase().includes(query) || n.body.toLowerCase().includes(query)
      );

      notesList.innerHTML = '';
      if (filtered.length === 0) {
        emptyState.style.display = 'block';
        emptyState.querySelector('p strong').textContent = query ? 'No matching notes' : 'No notes yet';
      } else {
        emptyState.style.display = 'none';
        filtered.forEach(note => {
          const card = document.createElement('div');
          card.className = 'note-card';
          card.innerHTML = `
            <h3>${escapeHtml(note.title || 'Untitled')}</h3>
            <div class="preview">${escapeHtml(note.body.split('\n')[0])}</div>
            <div class="date">${formatDate(note.updatedAt)}</div>
          `;
          card.addEventListener('click', () => openEditor(note.id));
          notesList.appendChild(card);
        });
      }
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    function showList() {
      listView.classList.remove('hidden');
      editorView.classList.remove('active');
      currentId = null;
      renderList();
    }

    function openEditor(id) {
      const note = notes.find(n => n.id === id);
      if (!note) return;
      currentId = id;
      titleInput.value = note.title;
      bodyInput.value = note.body;
      listView.classList.add('hidden');
      editorView.classList.add('active');
      titleInput.focus();
    }

    function saveCurrentNote() {
      if (currentId === null) return;
      const note = notes.find(n => n.id === currentId);
      if (!note) return;
      note.title = titleInput.value;
      note.body = bodyInput.value;
      note.updatedAt = Date.now();
      notes.sort((a, b) => b.updatedAt - a.updatedAt);
      saveNotes(notes);
    }

    // New note
    document.getElementById('newBtn').addEventListener('click', () => {
      const note = {
        id: crypto.randomUUID(),
        title: '',
        body: '',
        createdAt: Date.now(),
        updatedAt: Date.now()
      };
      notes.unshift(note);
      saveNotes(notes);
      openEditor(note.id);
    });

    // Back
    document.getElementById('backBtn').addEventListener('click', () => {
      saveCurrentNote();
      showList();
    });

    // Delete
    document.getElementById('deleteBtn').addEventListener('click', () => {
      if (currentId === null) return;
      notes = notes.filter(n => n.id !== currentId);
      saveNotes(notes);
      showList();
    });

    // Auto-save on typing
    let saveTimer;
    function debounceSave() {
      clearTimeout(saveTimer);
      saveTimer = setTimeout(saveCurrentNote, 400);
    }
    titleInput.addEventListener('input', debounceSave);
    bodyInput.addEventListener('input', debounceSave);

    // Search
    searchBar.addEventListener('input', renderList);

    // Initial render
    renderList();
  </script>
</body>
</html>
